services:
  db:
    image: pgvector/pgvector:pg15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calendar_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: fastapi_backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      GOOGLE_OAUTH_SCOPE: ${GOOGLE_OAUTH_SCOPE:-openid email profile https://www.googleapis.com/auth/calendar}
      FRONTEND_SUCCESS_URL: ${FRONTEND_SUCCESS_URL:-http://localhost:5173/dashboard}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-45}
      CHAT_TEMPERATURE: ${CHAT_TEMPERATURE:-0.6}
      CHAT_MAX_TOKENS: ${CHAT_MAX_TOKENS:-450}
      CHAT_RECENT_MESSAGES: ${CHAT_RECENT_MESSAGES:-5}
      CHAT_RELEVANT_MESSAGES: ${CHAT_RELEVANT_MESSAGES:-6}
      CHAT_MAX_CONTEXT_CHARS: ${CHAT_MAX_CONTEXT_CHARS:-6000}
      CHAT_RETRIEVAL_SCAN_LIMIT: ${CHAT_RETRIEVAL_SCAN_LIMIT:-200}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: react_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
